name: Greeting

on: [pull_request_target, issues]

jobs:
  greeting:
    name: Greet new contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ steps.app-token.outputs.token }}
          issue_message: "Hey there! Thank you for creating an issue :) Please take a moment to review our [**community guidelines**](https://github.com/AniTrend/edge-graphql/blob/dev/CONTRIBUTING.md) to make the contribution process easy and effective for everyone involved."
          pr_message: "Hey there! Thank you for this PR :) Please take a moment to review our [**community guidelines**](https://github.com/AniTrend/edge-graphql/blob/dev/CONTRIBUTING.md) to make the contribution process easy and effective for everyone involved."
