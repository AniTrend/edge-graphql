name: Deploy

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build against"
        required: true
        default: "latest"
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main
    tags:
      - "*"
  repository_dispatch:
    types:
      - swagger-spec-updated

env:
  IMAGE_NAME: ghcr.io/anitrend/edge-graphql
  CACHE_REF: ghcr.io/anitrend/edge-graphql:cache

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Ensure swagger spec
        env:
          SPEC_URL: ${{ github.event.client_payload.spec_url || vars.SWAGGER_SPEC_URL }}
          SPEC_B64: ${{ github.event.client_payload.spec_b64 }}
        run: |
          if [[ -f swagger-spec.json ]]; then
            echo "swagger-spec.json present"
            exit 0
          fi
          if [[ -n "$SPEC_B64" ]]; then
            echo "$SPEC_B64" | base64 --decode > swagger-spec.json
            exit 0
          fi
          if [[ -n "$SPEC_URL" ]]; then
            curl -fSL "$SPEC_URL" -o swagger-spec.json
            exit 0
          fi
          echo "swagger-spec.json missing and no spec source provided"
          exit 1
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set tag
        id: set-tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag=${{ github.event.inputs.tag }}
          elif [[ -n "${{ github.event.client_payload.tag }}" ]]; then
            tag=${{ github.event.client_payload.tag }}
          elif [[ "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            tag=${GITHUB_REF#refs/tags/}
          else
            tag=latest
          fi
          echo "Tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Build and push snapshot image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max
          tags: ${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.tag }}

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployed successfully!"
          echo "Environment: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'production' }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date -u)"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deployment failed!"
          echo "Please check the deployment logs and try again."
          exit 1
