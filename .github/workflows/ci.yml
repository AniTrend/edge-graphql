name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Config properties file
        run: bash .github/scripts/config-env.sh
      - name: Run lint checks
        run: npm ci
      - name: Run lint checks
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Config properties file
        run: bash .github/scripts/config-env.sh
      - name: Run checks
        run: npm ci
      - name: Run checks
        run: npm run typecheck

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-check, type-check]
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Config properties file
        run: bash .github/scripts/config-env.sh
      - name: Run tests
        run: npm ci
      - name: Run tests
        run: npm test

  build-matrix:
    name: Build Matrix Test
    runs-on: ${{ matrix.os }}
    needs: unit-test
    strategy:
      matrix:
        os: [ubuntu-latest]
        architecture: [x64, arm64]
      fail-fast: true
    steps:
      - name: Setup repo
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Config properties file
        run: bash .github/scripts/config-env.sh
      - name: Install dependencies
        run: npm ci
      - name: Compile Application
        run: npm run build

  deployment-ready:
    name: Deployment Ready Check
    runs-on: ubuntu-latest
    needs: [unit-test, build-matrix]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set deployment status
        run: |
          echo "DEPLOYMENT_READY=true" >> $GITHUB_ENV
          echo "BUILD_TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
