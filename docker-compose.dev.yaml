services:
  anitrend-graphql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anitrend-graphql
    networks:
      - default
    env_file: .env
    labels:
      - 'traefik.enable=${TRAEFIK_ENABLE}'
      - 'traefik.http.routers.anitrend-graphql.rule=Host(`${HOST}`)'
      - 'traefik.http.routers.anitrend-graphql.entrypoints=web,websecure'
      - 'traefik.http.routers.anitrend-graphql.service=anitrend-graphql'
      - 'traefik.http.routers.anitrend-graphql.tls=true'
      - 'traefik.http.routers.anitrend-graphql.tls.certresolver=${CERT_RESOLVER}'
      - 'traefik.http.services.anitrend-graphql.loadbalancer.server.port=${PORT}'
    restart: unless-stopped

networks:
  default:
    name: traefik
    external: true
